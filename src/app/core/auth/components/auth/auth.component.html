<div class="flex justify-center items-center min-h-screen">
  <div class="w-full max-w-md">
    <form class="space-y-4">
      <div>
        <label for="login-email" class="block mb-1 font-medium">Email</label>
        <input
          pInputText
          id="login-email"
          type="email"
          class="w-full"
          placeholder="Enter your email"
        />
      </div>
      <div>
        <label for="login-password" class="block mb-1 font-medium">Password</label>
        <input
          pInputText
          id="login-password"
          type="password"
          class="w-full"
          placeholder="Enter your password"
        />
      </div>

      <div>
        <label for="register-confirm" class="block mb-1 font-medium">Confirm Password</label>
        <input
          pInputText
          id="register-confirm"
          type="password"
          class="w-full"
          placeholder="Confirm your password"
        />
      </div>
      <button pButton type="submit" label="Login" class="w-full"></button>
    </form>
  </div>
</div>
