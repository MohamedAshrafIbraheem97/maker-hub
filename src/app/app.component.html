<main class="h-full">
  <div class="fixed inset-e-3 top-3 flex flex-col gap-2 z-50">
    <button mat-icon-button (click)="toggleLanguage()" aria-label="Toggle language">
      <fa-icon [icon]="langIcon" />
    </button>
    <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle theme">
      <fa-icon [icon]="themeIcon()" />
    </button>
  </div>

  <router-outlet></router-outlet>
</main>
